services:
  - type: web
    name: traffic-violation-system
    runtime: python
    buildCommand: "bash build.sh"
    startCommand: "gunicorn config.wsgi:application"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: traffic-violation-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: ".onrender.com"
      - key: WEB_CONCURRENCY
        value: "4"

databases:
  - name: traffic-violation-db
    databaseName: traffic_violation_system
    user: traffic_violation_system
