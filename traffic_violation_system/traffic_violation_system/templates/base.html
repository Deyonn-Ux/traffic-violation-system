
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Traffic Violation System{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root {
            --navy: #071a3d;
            --blue: #0647b8;
            --sky: #dff4ff;
            --red: #d90d28;
            --gold: #ffd23f;
            --ink: #101522;
            --muted: #647084;
            --line: rgba(8, 27, 61, 0.14);
            --panel: rgba(255, 255, 255, 0.95);
        }

        * {
            letter-spacing: 0;
        }

        body {
            min-height: 100vh;
            color: var(--ink);
            background: #f7fbff;
            font-family: "Segoe UI", Arial, sans-serif;
        }

        .app-shell {
            min-height: 100vh;
            background:
                linear-gradient(180deg, rgba(255, 255, 255, 0.12) 0, rgba(255, 255, 255, 0.82) 420px, #f7fbff 421px),
                radial-gradient(circle at 80% 24%, rgba(85, 181, 219, 0.26), transparent 28%),
                linear-gradient(90deg, rgba(7, 26, 61, 0.06) 1px, transparent 1px),
                linear-gradient(0deg, rgba(7, 26, 61, 0.05) 1px, transparent 1px);
            background-size: auto, auto, 76px 76px, 76px 76px;
        }

        .navbar {
            background: var(--navy);
            border-bottom: 0;
            min-height: 78px;
        }

        .navbar-brand {
            align-items: center;
            display: inline-flex;
            gap: 10px;
            font-weight: 800;
        }

        .brand-mark {
            align-items: center;
            background: var(--red);
            border: 3px solid #fff;
            border-radius: 999px;
            box-shadow: inset 0 6px 0 rgba(255, 210, 63, 0.9);
            color: #fff;
            display: inline-flex;
            font-size: 0.8rem;
            font-weight: 900;
            height: 52px;
            justify-content: center;
            width: 52px;
        }

        .nav-link {
            color: rgba(255, 255, 255, 0.8);
            font-size: 0.85rem;
            font-weight: 800;
            text-transform: uppercase;
        }

        .nav-link:hover,
        .nav-link:focus {
            color: #fff;
        }

        .nav-link.nav-alert {
            align-items: center;
            background: var(--red);
            color: #fff;
            display: inline-flex;
            min-height: 78px;
            padding-left: 20px;
            padding-right: 20px;
        }

        .notice-bar {
            background: var(--blue);
            color: #fff;
            font-weight: 700;
            padding: 12px 0;
        }

        .notice-bar .btn {
            min-height: 34px;
            padding: 5px 14px;
        }

        .page-wrap {
            padding: 0 0 48px;
        }

        .hero-panel,
        .content-panel,
        .stat-card {
            background: var(--panel);
            border: 1px solid rgba(255, 255, 255, 0.7);
            border-radius: 8px;
            box-shadow: 0 18px 48px rgba(15, 23, 42, 0.1);
        }

        .hero-panel {
            padding: clamp(24px, 4vw, 38px);
            overflow: hidden;
            position: relative;
        }

        .hero-panel::after {
            content: "";
            position: absolute;
            inset: auto -80px -110px auto;
            width: 260px;
            height: 260px;
            background: radial-gradient(circle, rgba(255, 210, 63, 0.3), transparent 62%);
            pointer-events: none;
        }

        .portal-hero {
            background:
                linear-gradient(90deg, rgba(255, 255, 255, 0.98) 0 48%, rgba(223, 244, 255, 0.82) 48% 100%),
                linear-gradient(90deg, transparent 0 57%, rgba(7, 26, 61, 0.12) 57.2% 57.7%, transparent 57.7% 100%);
            border: 0;
            box-shadow: none;
            min-height: 510px;
            padding: clamp(26px, 5vw, 56px) clamp(18px, 4vw, 56px);
        }

        .portal-hero::after {
            inset: 34px 34px 0 auto;
            width: min(44vw, 520px);
            height: 440px;
            background:
                linear-gradient(90deg, rgba(7, 26, 61, 0.22) 2px, transparent 2px) 0 0/82px 100%,
                linear-gradient(rgba(7, 26, 61, 0.22) 2px, transparent 2px) 0 0/100% 68px;
            border: 3px solid rgba(7, 26, 61, 0.18);
            opacity: 0.55;
            pointer-events: none;
        }

        .hero-illustration {
            bottom: 18px;
            height: 330px;
            position: absolute;
            right: clamp(18px, 11vw, 170px);
            width: 190px;
            z-index: 1;
        }

        .officer-head {
            background: #fff;
            border: 3px solid #172033;
            border-radius: 42% 42% 46% 46%;
            height: 64px;
            margin: 0 auto;
            position: relative;
            width: 58px;
        }

        .officer-head::before {
            background: var(--navy);
            border-radius: 50% 50% 12px 12px;
            content: "";
            height: 26px;
            left: -8px;
            position: absolute;
            top: -19px;
            transform: rotate(-8deg);
            width: 80px;
        }

        .officer-body {
            background: #4f9bd3;
            border: 3px solid #172033;
            clip-path: polygon(22% 0, 78% 0, 100% 100%, 0 100%);
            height: 144px;
            margin: 4px auto 0;
            width: 132px;
        }

        .officer-arm {
            background: #fff;
            border: 3px solid #172033;
            border-bottom: 0;
            height: 126px;
            left: 32px;
            position: absolute;
            top: 4px;
            transform: rotate(14deg);
            transform-origin: bottom;
            width: 28px;
        }

        .officer-leg {
            background: #172033;
            height: 94px;
            margin: 0 auto;
            width: 90px;
        }

        .eyebrow {
            color: var(--blue);
            font-size: 0.78rem;
            font-weight: 800;
            text-transform: uppercase;
        }

        .page-title {
            font-weight: 850;
            line-height: 1.05;
            margin: 8px 0 12px;
        }

        .lead-copy {
            color: var(--muted);
            max-width: 740px;
        }

        .policy-ribbon {
            background: var(--red);
            color: #fff;
            display: inline-flex;
            font-size: clamp(1rem, 2vw, 1.55rem);
            font-weight: 800;
            margin-bottom: 22px;
            padding: 13px 28px;
            text-transform: uppercase;
        }

        .lookup-card {
            max-width: 620px;
            position: relative;
            z-index: 2;
        }

        .lookup-input {
            background: #ededed;
            border: 2px solid #777;
            border-radius: 16px;
            font-size: 1.04rem;
            min-height: 58px;
            text-align: center;
        }

        .divider-word {
            align-items: center;
            display: grid;
            gap: 14px;
            grid-template-columns: 1fr auto 1fr;
            margin: 14px 0;
            max-width: 620px;
        }

        .divider-word::before,
        .divider-word::after {
            background: #111;
            content: "";
            height: 3px;
        }

        .btn {
            border-radius: 6px;
            font-weight: 700;
        }

        .btn-primary {
            background: var(--red);
            border-color: var(--red);
        }

        .btn-warning {
            background: var(--gold);
            border-color: var(--gold);
            color: #1b2433;
        }

        .stat-card {
            padding: 20px;
            height: 100%;
            transition: transform 0.18s ease, box-shadow 0.18s ease;
        }

        .stat-card:hover {
            box-shadow: 0 20px 54px rgba(15, 23, 42, 0.16);
            transform: translateY(-3px);
        }

        .stat-value {
            font-size: clamp(2rem, 5vw, 3.4rem);
            font-weight: 850;
            line-height: 1;
        }

        .stat-label {
            color: var(--muted);
            font-weight: 700;
        }

        .content-panel {
            padding: 22px;
        }

        .table {
            margin-bottom: 0;
        }

        .table thead th {
            color: var(--muted);
            font-size: 0.78rem;
            text-transform: uppercase;
            border-bottom: 1px solid var(--line);
        }

        .empty-state {
            border: 1px dashed var(--line);
            border-radius: 8px;
            padding: 38px 20px;
            text-align: center;
            color: var(--muted);
            background: rgba(255, 255, 255, 0.55);
        }

        .status-pill {
            display: inline-flex;
            align-items: center;
            min-height: 28px;
            padding: 4px 10px;
            border-radius: 999px;
            background: rgba(37, 99, 235, 0.12);
            color: #1d4ed8;
            font-weight: 800;
            font-size: 0.82rem;
        }

        @media (max-width: 767px) {
            .navbar {
                min-height: auto;
            }

            .nav-link.nav-alert {
                min-height: 44px;
            }

            .page-wrap {
                padding-top: 0;
            }

            .content-panel {
                padding: 16px;
            }

            .hero-panel {
            background: rgba(255, 255, 255, 0.96);
                min-height: auto;
            }

            .portal-hero::after,
            .hero-illustration {
                display: none;
            }
        }
    </style>
</head>
<body>
<div class="app-shell">
    <nav class="navbar navbar-expand-lg navbar-dark sticky-top">
        <div class="container">
            <a class="navbar-brand" href="/">
                <span class="brand-mark">TVS</span>
                <span>Traffic Violation System</span>
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainNav" aria-controls="mainNav" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="mainNav">
                <div class="navbar-nav ms-auto gap-lg-1">
                    <a class="nav-link" href="/">Home</a>
                    <a class="nav-link" href="/payments/">Pay Fine</a>
                    <a class="nav-link" href="/vehicles/">Vehicle Portal</a>
                    <a class="nav-link" href="/drivers/">Drivers</a>
                    <a class="nav-link" href="/admin/">Admin</a>
                    <a class="nav-link nav-alert" href="/violations/">Check Violations</a>
                </div>
            </div>
        </div>
    </nav>

    <div class="notice-bar">
        <div class="container d-flex flex-column flex-md-row align-items-md-center justify-content-between gap-2">
            <span>Manage vehicle records and review violations from one account.</span>
            <a class="btn btn-warning btn-sm" href="/vehicles/">Visit Vehicle Portal</a>
        </div>
    </div>

    <main class="container page-wrap">
        {% block content %}{% endblock %}
    </main>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
